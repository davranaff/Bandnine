name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".env.example"
      - ".env.test.example"
      - "docker-compose.yml"
      - "Makefile"
  pull_request:
    paths:
      - "backend/**"
      - ".env.example"
      - ".env.test.example"
      - "docker-compose.yml"
      - "Makefile"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Load env from .env file
        run: |
          if [ -f ../.env ]; then
            cp ../.env .env
          else
            cp ../.env.example .env
          fi

          while IFS= read -r line; do
            case "$line" in
              ''|\#*) continue ;;
            esac
            echo "$line" >> "$GITHUB_ENV"
          done < .env

          test_db_url="$(grep '^TEST_DATABASE_URL=' .env | cut -d= -f2- || true)"
          if [ -n "$test_db_url" ]; then
            echo "DATABASE_URL=$test_db_url" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Migrate
        run: alembic upgrade head

      - name: Alembic drift check
        run: alembic check

      - name: Run tests
        run: pytest -q
