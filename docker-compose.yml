services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    env_file:
      - ./.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_HOST_API: "${REACT_APP_HOST_API:-http://localhost:${API_PORT:-8000}}"
      REACT_APP_ASSETS_API: "${REACT_APP_ASSETS_API:-}"
      REACT_APP_MAPBOX_API: "${REACT_APP_MAPBOX_API:-}"
      REACT_APP_DEFAULT_API_LANG: "${REACT_APP_DEFAULT_API_LANG:-uz}"
      REACT_APP_AUTH_MOCK: "${REACT_APP_AUTH_MOCK:-false}"
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && npm start"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ielts}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.workers.arq_worker.WorkerSettings
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
